services:
  postgres:
    image: postgres:17
    container_name: test-api-postgres
    restart: unless-stopped
    ports:
      - '5437:5432'
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform_dev
      POSTGRES_DB: test_api
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U platform -d test_api']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
